steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/clever-overview-326002/github.com/renelzm/mnemosine-audio:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/clever-overview-326002/github.com/renelzm/mnemosine-audio:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mnemosine-audios'
      - '--image'
      - 'gcr.io/clever-overview-326002/github.com/renelzm/mnemosine-audio:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--quiet'

images:
  - 'gcr.io/clever-overview-326002/github.com/renelzm/mnemosine-audio:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
